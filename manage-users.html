<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Users | Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      background-size: 200% 200%;
      animation: gradientShift 15s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body class="font-[Inter] min-h-screen text-white p-0 m-0" onload="loadUsers()">
  <aside class="fixed left-0 top-0 h-screen w-64 glass p-8 flex flex-col z-20">
    <div class="text-xl font-bold mb-8 flex items-center gap-3">
      <span class="text-2xl">🛠️</span>
      <span>Admin Panel</span>
    </div>

    <nav class="flex-1 space-y-2">
      <a href="admin-dashboard.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">📌 Dashboard</a>
      <a href="manage-users.html" class="flex items-center gap-3 p-3 rounded-xl bg-white/10 text-white border border-white/20">👥 Manage Users</a>
      <a href="manage-categories.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">🏷️ Categories</a>
    </nav>

    <a href="admin-login.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all mt-auto">🚪 Logout</a>
  </aside>

  <main class="ml-64 p-8 pt-20">
    <header class="mb-12">
      <h1 class="text-3xl font-bold">Manage Users</h1>
      <p class="text-gray-400 mt-2">You can only ban/unban users (no edit/delete).</p>
    </header>

    <div class="glass rounded-2xl overflow-hidden">
      <table class="w-full text-left">
        <thead class="bg-white/5 border-b border-white/10">
          <tr>
            <th class="p-6">User</th>
            <th class="p-6">Joined</th>
            <th class="p-6">Current Balance</th>
            <th class="p-6">Status</th>
            <th class="p-6">Action</th>
          </tr>
        </thead>
        <tbody id="usersBody" class="divide-y divide-white/10"></tbody>
      </table>
    </div>
  </main>

  <script>
    const MAX_AMOUNT = 10000000; // 1 Cr

function safeAmount(x) {
  const n = Number(String(x ?? "").replaceAll(",", "").trim());
  if (!Number.isFinite(n)) return 0;
  if (n < 1 || n > MAX_AMOUNT) return 0;
  return n;
}

    (function guardAdmin() {
  if (sessionStorage.getItem("isAdmin") !== "true") {
    window.location.href = "admin-login.html";
  }
})();

    function ensureStores() {
      if (!localStorage.getItem("users")) localStorage.setItem("users", "[]");
      if (!localStorage.getItem("transactions")) localStorage.setItem("transactions", "[]");
    }

    function getUsers() {
      ensureStores();
      return JSON.parse(localStorage.getItem("users") || "[]");
    }

    function saveUsers(users) {
      localStorage.setItem("users", JSON.stringify(users));
    }

    function getTransactions() {
      ensureStores();
      return JSON.parse(localStorage.getItem("transactions") || "[]");
    }

    function computeBalanceForUser(userId) {
      const tx = getTransactions().filter(t => t.userId === userId);
      let inc = 0, exp = 0;

      tx.forEach(t => {
        const amt = safeAmount(t.amount);
        if (t.type === "income") inc += amt;
        else exp += amt;
      });

      return inc - exp;
    }

    function toggleBan(userId) {
      const users = getUsers();
      const idx = users.findIndex(u => u.id === userId);
      if (idx === -1) return alert("User not found.");

      const cur = (users[idx].status || "active").toLowerCase();
      users[idx].status = (cur === "active") ? "banned" : "active";
      saveUsers(users);

      // If banned user is currently logged in, force logout
      const current = JSON.parse(sessionStorage.getItem("currentUser") || "null");
      if (current && current.id === userId && users[idx].status === "banned") {
        sessionStorage.removeItem("currentUser");
      }

      loadUsers();
    }

    function loadUsers() {
      ensureStores();
      const users = getUsers();
      const tbody = document.getElementById("usersBody");

      if (users.length === 0) {
        tbody.innerHTML = `<tr><td class="p-6 text-gray-400" colspan="5">No users registered yet.</td></tr>`;
        return;
      }

      tbody.innerHTML = users.map(u => {
        const joined = u.createdAt ? new Date(u.createdAt).toLocaleDateString() : "-";
        const status = (u.status || "active").toLowerCase();
        const badge = status === "active"
          ? "bg-green-500/20 text-green-400 border border-green-500/20"
          : "bg-red-500/20 text-red-300 border border-red-500/20";

        const balance = computeBalanceForUser(u.id);
        const letter = (u.name || "U").trim().slice(0,1).toUpperCase();

        return `
          <tr class="hover:bg-white/5 transition-colors">
            <td class="p-6">
              <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-indigo-500/20 flex items-center justify-center text-sm font-bold">${letter}</div>
                <div>
                  <div class="font-semibold">${u.name || "User"}</div>
                  <div class="text-xs text-gray-400">${u.email || ""}</div>
                </div>
              </div>
            </td>

            <td class="p-6 text-gray-300">${joined}</td>

            <td class="p-6 font-mono font-bold text-indigo-300">₹${balance.toLocaleString()}</td>

            <td class="p-6">
              <span class="px-3 py-1 rounded-full text-xs ${badge}">
                ${status === "active" ? "Active" : "Banned"}
              </span>
            </td>

            <td class="p-6">
              <button
                onclick="toggleBan('${u.id}')"
                class="px-4 py-2 rounded-xl font-semibold transition-all
                       ${status === "active"
                        ? "bg-red-500/20 text-red-300 hover:bg-red-500/30 border border-red-500/20"
                        : "bg-green-500/20 text-green-300 hover:bg-green-500/30 border border-green-500/20"}"
              >
                ${status === "active" ? "Ban" : "Unban"}
              </button>
            </td>
          </tr>
        `;
      }).join("");
    }
  </script>
</body>
</html>

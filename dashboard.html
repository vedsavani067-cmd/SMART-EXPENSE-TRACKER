<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Smart Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      background-size: 200% 200%;
      animation: gradientShift 15s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; opacity: 0; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body class="font-inter min-h-screen text-white p-0 m-0" onload="loadDashboardData()">

  <aside class="fixed left-0 top-0 h-screen w-64 glass p-8 flex flex-col z-20 animate-fade-in-up">
    <div class="text-xl font-bold mb-8 flex items-center gap-3">
      <span class="text-2xl">💰</span>
      <span>Expense Tracker</span>
    </div>

    <nav class="flex-1 space-y-2">
      <a href="dashboard.html" class="flex items-center gap-3 p-3 rounded-xl bg-white/10 text-white border border-white/20">
        <span>📌</span><span>Dashboard</span>
      </a>
      <a href="add-income.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">
        <span>🟢</span><span>Add Income</span>
      </a>
      <a href="add-expense.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">
        <span>🔴</span><span>Add Expense</span>
      </a>
      <a href="history.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">
        <span>🧾</span><span>History</span>
      </a>
      <a href="reports.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">
        <span>📊</span><span>Reports</span>
      </a>
    </nav>

    <a href="login.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all mt-auto">
      <span>🚪</span><span>Logout</span>
    </a>
  </aside>

  <main class="ml-64 p-8 pt-20">
    <header class="animate-fade-in-up mb-12">
      <h1 class="text-4xl font-bold mb-2">Dashboard</h1>
      <p class="text-xl text-gray-300">Welcome back, User</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12 animate-fade-in-up">
      <div class="glass p-6 rounded-2xl">
        <div class="text-gray-400 mb-2">Total Balance</div>
        <div id="totalBalance"
             class="text-3xl font-bold text-white font-mono tabular-nums max-w-full overflow-hidden text-ellipsis whitespace-nowrap"
             title="">
          ₹0
        </div>
      </div>

      <div class="glass p-6 rounded-2xl">
        <div class="text-gray-400 mb-2">Income</div>
        <div id="totalIncome"
             class="text-3xl font-bold text-green-400 font-mono tabular-nums max-w-full overflow-hidden text-ellipsis whitespace-nowrap"
             title="">
          ₹0
        </div>
      </div>

      <div class="glass p-6 rounded-2xl">
        <div class="text-gray-400 mb-2">Expenses</div>
        <div id="totalExpense"
             class="text-3xl font-bold text-red-400 font-mono tabular-nums max-w-full overflow-hidden text-ellipsis whitespace-nowrap"
             title="">
          ₹0
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12 animate-fade-in-up">
      <a href="add-income.html" class="glass p-6 rounded-2xl flex items-center gap-4 hover:bg-white/5 transition-all cursor-pointer group">
        <div class="w-12 h-12 rounded-full bg-green-500/20 flex items-center justify-center text-green-400 text-xl group-hover:scale-110 transition-transform">➕</div>
        <div>
          <h3 class="font-semibold text-lg">Add Income</h3>
          <p class="text-gray-400 text-sm">Record incoming funds</p>
        </div>
      </a>

      <a href="add-expense.html" class="glass p-6 rounded-2xl flex items-center gap-4 hover:bg-white/5 transition-all cursor-pointer group">
        <div class="w-12 h-12 rounded-full bg-red-500/20 flex items-center justify-center text-red-400 text-xl group-hover:scale-110 transition-transform">➖</div>
        <div>
          <h3 class="font-semibold text-lg">Add Expense</h3>
          <p class="text-gray-400 text-sm">Track daily spending</p>
        </div>
      </a>
    </div>

    <div class="glass p-8 rounded-2xl animate-fade-in-up">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold">Recent Transactions</h2>
        <a href="history.html" class="text-sm text-indigo-400 hover:text-indigo-300">View All</a>
      </div>
      <div class="space-y-4" id="recentTransactionsList">
        <div class="text-gray-400 text-sm">No transactions yet.</div>
      </div>
    </div>
  </main>

  <script>
    const MAX_AMOUNT = 10000000; // 1 Cr

function safeAmount(x) {
  const n = Number(String(x ?? "").replaceAll(",", "").trim());
  if (!Number.isFinite(n)) return 0;
  if (n < 1 || n > MAX_AMOUNT) return 0;
  return n;
}

  function requireLogin() {
    const u = JSON.parse(sessionStorage.getItem("currentUser") || "null");
    if (!u) {
      window.location.href = "login.html";
      return null;
    }
    if (!localStorage.getItem("transactions")) localStorage.setItem("transactions", "[]");
    return u;
  }

  function setValue(elId, text) {
    const el = document.getElementById(elId);
    el.textContent = text;
    el.title = text;
  }

  function loadDashboardData() {
    const currentUser = requireLogin();
    if (!currentUser) return;

    const allTx = JSON.parse(localStorage.getItem("transactions") || "[]");
    const transactions = allTx.filter(t => t.userId === currentUser.id);

    let income = 0;
    let expense = 0;

    transactions.forEach(t => {
     const amt = safeAmount(t.amount);
      if (t.type === "income") income += amt;
      else expense += amt;
    });

    const balance = income - expense;

    setValue("totalBalance", balance.toLocaleString());
    setValue("totalIncome", income.toLocaleString());
    setValue("totalExpense", expense.toLocaleString());

    const list = document.getElementById("recentTransactionsList");
    if (transactions.length === 0) {
      list.innerHTML = `<div class="text-gray-400 text-sm">No transactions yet.</div>`;
      return;
    }

    const recent = [...transactions]
      .sort((a, b) => new Date(b.date) - new Date(a.date))
      .slice(0, 3);

    list.innerHTML = recent.map(t => {
      const isIncome = t.type === "income";
      const sign = isIncome ? "+" : "-";
      const colorClass = isIncome ? "text-green-400" : "text-red-400";
      const title = t.category || t.source || "Transaction";
      const dateStr = t.date ? new Date(t.date).toLocaleDateString() : "";
     const amt = safeAmount(t.amount);


      return `
        <div class="flex items-center justify-between p-4 rounded-xl bg-white/5 hover:bg-white/10 transition-all">
          <div class="min-w-0">
            <div class="font-semibold truncate">${title}</div>
            <div class="text-xs text-gray-400">${dateStr}</div>
          </div>
          <div class="font-bold ${colorClass} whitespace-nowrap">${sign}${amt.toLocaleString()}</div>
        </div>
      `;
    }).join("");
  }
</script>
</body>
</html>

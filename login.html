<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Smart Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      background-size: 200% 200%;
      animation: gradientShift 15s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .animate-float { animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    .animate-scale-in { animation: scaleIn 0.3s ease-out forwards; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>

<body class="font-[Inter] min-h-screen text-white flex items-center justify-center p-4">
  <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full bg-indigo-500/10 blur-3xl -z-10"></div>

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-indigo-500/20 text-4xl mb-6 animate-float shadow-lg shadow-indigo-500/20">
        🔐
      </div>
      <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
      <p class="text-gray-400">Track your expenses intelligently</p>
    </div>

    <div id="errorMessage" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-xl text-red-200 text-sm text-center"></div>

    <form onsubmit="handleLogin(event)" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
        <input
          type="email"
          id="userEmail"
          required
          class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
          placeholder="name@company.com"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
        <input
          type="password"
          id="userPass"
          required
          class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
          placeholder="********"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500
               text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-500/30
               transform hover:scale-1.02"
      >
        Sign In
      </button>

      <!-- Sign Up button (same style, just color + hover box glow) -->
      <a href="signup.html"
         class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500
                text-white font-bold py-4 rounded-xl transition-all
                shadow-lg shadow-emerald-500/30 hover:shadow-emerald-400/40 hover:shadow-2xl
                ring-1 ring-white/10 hover:ring-emerald-300/40
                transform hover:scale-1.02 block text-center">
        Sign Up
      </a>
    </form>

    <div class="mt-8 text-center border-t border-white/10 pt-6">
      <a
        href="admin-login.html"
        class="inline-flex items-center gap-2 text-xs font-medium text-gray-500 hover:text-indigo-400 transition-colors px-4 py-2 rounded-full hover:bg-white/5"
      >
        Switch to Admin Portal
      </a>
    </div>
  </div>

  <div id="successPopup" class="fixed inset-0 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden z-50">
    <div class="glass p-8 rounded-2xl text-center animate-scale-in max-w-sm mx-4">
      <div class="w-16 h-16 bg-green-500/20 rounded-full flex items-center justify-center text-3xl mb-4 mx-auto text-green-400">✅</div>
      <h3 class="text-2xl font-bold text-white mb-2">Login Successful!</h3>
      <p class="text-gray-300 mb-4">Redirecting to your dashboard...</p>
      <div class="w-full bg-white/10 h-1.5 rounded-full overflow-hidden">
        <div class="bg-green-500 h-full w-full"></div>
      </div>
    </div>
  </div>

 <script>
  function ensureStores() {
    if (!localStorage.getItem("users")) localStorage.setItem("users", "[]");
    if (!localStorage.getItem("transactions")) localStorage.setItem("transactions", "[]");
  }

  function handleLogin(e) {
    e.preventDefault();
    ensureStores();

    const email = document.getElementById("userEmail").value.trim().toLowerCase();
    const pass = document.getElementById("userPass").value;

    const errorDiv = document.getElementById("errorMessage");
    const successPopup = document.getElementById("successPopup");

    errorDiv.classList.add("hidden");

    const users = JSON.parse(localStorage.getItem("users") || "[]");

    const user = users.find(u =>
      (u.email || "").toLowerCase() === email &&
      String(u.password || "") === String(pass) &&
      ((u.status || "active").toLowerCase() === "active")
    );

    if (!user) {
      errorDiv.textContent = "Incorrect Email or Password!";
      errorDiv.classList.remove("hidden");
      return;
    }

    sessionStorage.setItem("currentUser", JSON.stringify({
      id: user.id,
      name: user.name,
      email: user.email
    }));

    if (successPopup) successPopup.classList.remove("hidden");
    setTimeout(() => window.location.href = "dashboard.html", 1200);
  }
</script>

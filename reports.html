<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports | Smart Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); background-size: 200% 200%; animation: gradientShift 15s ease infinite; }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>

<body class="font-[Inter] min-h-screen text-white p-0 m-0" onload="initReports()">
  <aside class="fixed left-0 top-0 h-screen w-64 glass p-8 flex flex-col z-20">
    <div class="text-xl font-bold mb-8 flex items-center gap-3">
      <span class="text-2xl">💰</span><span>Expense Tracker</span>
    </div>
    <nav class="flex-1 space-y-2">
      <a href="dashboard.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">📌 Dashboard</a>
      <a href="add-income.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">🟢 Add Income</a>
      <a href="add-expense.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">🔴 Add Expense</a>
      <a href="history.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">🧾 History</a>
      <a href="reports.html" class="flex items-center gap-3 p-3 rounded-xl bg-white/10 text-white border border-white/20">📊 Reports</a>
    </nav>
    <a href="login.html" onclick="sessionStorage.removeItem('currentUser')" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all mt-auto">🚪 Logout</a>
  </aside>

  <main class="ml-64 p-8 pt-20">
    <header class="mb-8">
      <h1 class="text-4xl font-bold mb-2">Financial Reports</h1>
      <p class="text-xl text-gray-300">Visualize your income and spending</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
      <div class="glass p-6 rounded-2xl">
        <div class="text-gray-400 text-sm mb-1">Total Income</div>
        <div class="text-2xl font-bold text-green-400" id="repIncome">0</div>
      </div>
      <div class="glass p-6 rounded-2xl">
        <div class="text-gray-400 text-sm mb-1">Total Expenses</div>
        <div class="text-2xl font-bold text-red-400" id="repExpense">0</div>
      </div>
      <div class="glass p-6 rounded-2xl">
        <div class="text-gray-400 text-sm mb-1">Net Savings</div>
        <div class="text-2xl font-bold text-blue-400" id="repSavings">0</div>
      </div>
      <div class="glass p-6 rounded-2xl">
        <div class="text-gray-400 text-sm mb-1">Savings Rate</div>
        <div class="text-2xl font-bold text-amber-400" id="repRate">0%</div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div class="glass p-8 rounded-3xl">
        <h3 class="text-xl font-bold mb-6">Expense Breakdown By Category</h3>
        <div class="w-full h-64"><canvas id="doughnutChart"></canvas></div>
      </div>

      <div class="glass p-8 rounded-3xl">
        <h3 class="text-xl font-bold mb-6">Monthly Trend</h3>
        <div class="w-full h-72"><canvas id="barChart"></canvas></div>
      </div>
    </div>
  </main>

  <script>
    const MAX_AMOUNT = 10000000; // 1 Cr

function safeAmount(x) {
  const n = Number(String(x ?? "").replaceAll(",", "").trim());
  if (!Number.isFinite(n)) return 0;
  if (n < 1 || n > MAX_AMOUNT) return 0;
  return n;
}

    let doughnutChartInstance = null;
    let barChartInstance = null;

    function requireLogin() {
      const currentUser = JSON.parse(sessionStorage.getItem("currentUser") || "null");
      if (!currentUser) { window.location.href = "login.html"; return null; }
      if (!localStorage.getItem("transactions")) localStorage.setItem("transactions", "[]");
      return currentUser;
    }

    function initReports() {
      const currentUser = requireLogin();
      if (!currentUser) return;

      Chart.defaults.color = "#94a3b8";
      Chart.defaults.font.family = "Inter";

      const allTx = JSON.parse(localStorage.getItem("transactions") || "[]");
      const transactions = allTx.filter(t => t.userId === currentUser.id);

      let totalInc = 0;
      let totalExp = 0;

      const categoryData = {};
      const monthlyData = {}; // key => {income, expense}

      transactions.forEach(t => {
      const amt = safeAmount(t.amount);
        const d = t.date ? new Date(t.date) : new Date();
        const monthKey = d.toLocaleString("default", { month: "short", year: "numeric" });

        if (!monthlyData[monthKey]) monthlyData[monthKey] = { income: 0, expense: 0 };

        if (t.type === "income") {
          totalInc += amt;
          monthlyData[monthKey].income += amt;
        } else {
          totalExp += amt;
          monthlyData[monthKey].expense += amt;

          const cat = t.category || "Other";
          categoryData[cat] = (categoryData[cat] || 0) + amt;
        }
      });

      const savings = totalInc - totalExp;
      const rate = totalInc > 0 ? ((savings / totalInc) * 100).toFixed(1) : "0.0";

      document.getElementById("repIncome").textContent = "₹" + totalInc.toLocaleString();
      document.getElementById("repExpense").textContent = "₹" + totalExp.toLocaleString();
      document.getElementById("repSavings").textContent = "₹" + savings.toLocaleString();
      document.getElementById("repRate").textContent = rate + "%";

      const doughnutLabels = Object.keys(categoryData);
      const doughnutValues = Object.values(categoryData);

      const dCtx = document.getElementById("doughnutChart").getContext("2d");
      if (doughnutChartInstance) doughnutChartInstance.destroy();
      doughnutChartInstance = new Chart(dCtx, {
        type: "doughnut",
        data: {
          labels: doughnutLabels.length ? doughnutLabels : ["No Data"],
          datasets: [{
            data: doughnutValues.length ? doughnutValues : [1],
            backgroundColor: ["#ef4444","#f59e0b","#3b82f6","#10b981","#8b5cf6","#ec4899"],
            borderColor: "transparent",
            hoverOffset: 10
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: "bottom" } },
          cutout: "70%"
        }
      });

      const months = Object.keys(monthlyData);
      const incData = months.map(m => monthlyData[m].income);
      const expData = months.map(m => monthlyData[m].expense);

      const bCtx = document.getElementById("barChart").getContext("2d");
      if (barChartInstance) barChartInstance.destroy();
      barChartInstance = new Chart(bCtx, {
        type: "bar",
        data: {
          labels: months.length ? months : ["No Data"],
          datasets: [
            { label: "Income", data: months.length ? incData : [0], backgroundColor: "#10b981", borderRadius: 4 },
            { label: "Expense", data: months.length ? expData : [0], backgroundColor: "#ef4444", borderRadius: 4 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { beginAtZero: true, grid: { color: "rgba(255,255,255,0.05)" }, border: { display: false } },
            x: { grid: { display: false }, border: { display: false } }
          },
          plugins: { legend: { position: "bottom" } }
        }
      });
    }
  </script>
</body>
</html>

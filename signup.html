<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | Smart Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      background-size: 200% 200%;
      animation: gradientShift 15s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body class="font-[Inter] min-h-screen text-white flex items-center justify-center p-4">
  <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full bg-emerald-500/10 blur-3xl -z-10"></div>

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-emerald-500/20 text-4xl mb-6 shadow-lg shadow-emerald-500/20">📝</div>
      <h1 class="text-3xl font-bold mb-2">Create Account</h1>
      <p class="text-gray-400">Create a new account to start tracking.</p>
    </div>

    <div id="errorMessage" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-xl text-red-200 text-sm text-center"></div>

    <form onsubmit="handleSignup(event)" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Full Name</label>
        <input id="name" type="text" required
          class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
          placeholder="Your name" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
        <input id="email" type="email" required
          class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
          placeholder="name@example.com" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
        <input id="password" type="password" required minlength="6"
          class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
          placeholder="Min 6 characters" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Confirm Password</label>
        <input id="confirm" type="password" required minlength="6"
          class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
          placeholder="Re-type password" />
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500
               text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-emerald-500/30
               transform hover:scale-1.02">
        Sign Up
      </button>
    </form>

    <div class="mt-8 text-center border-t border-white/10 pt-6">
      <a href="login.html" class="text-sm text-gray-400 hover:text-white transition-colors">
        Already have an account? Sign In
      </a>
    </div>
  </div>

  <script>
 function ensureSeedData() {
  if (!localStorage.getItem("users")) localStorage.setItem("users", "[]");
  if (!localStorage.getItem("transactions")) localStorage.setItem("transactions", "[]");

  const demoMode = new URLSearchParams(window.location.search).get("demo") === "1";
  if (!demoMode) return;

  const users = JSON.parse(localStorage.getItem("users") || "[]");
  if (users.length === 0) {
    users.push({
      id: "udemo-ved",
      name: "Ved",
      email: "ved01@gmail.com",
      password: "123456789",
      createdAt: new Date().toISOString(),
      status: "active"
    });
    localStorage.setItem("users", JSON.stringify(users));
  }
}

    function handleSignup(e) {
      e.preventDefault();
      ensureSeedData();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;

      const errorDiv = document.getElementById("errorMessage");
      errorDiv.classList.add("hidden");

      if (password !== confirm) {
        errorDiv.textContent = "Passwords do not match.";
        errorDiv.classList.remove("hidden");
        return;
      }

      const users = JSON.parse(localStorage.getItem("users") || "[]");
      if (users.some(u => (u.email || "").toLowerCase() === email)) {
        errorDiv.textContent = "Email already registered. Please sign in.";
        errorDiv.classList.remove("hidden");
        return;
      }

      const newUser = {
        id: "u_" + Date.now(),
        name,
        email,
        password, // demo-only until backend
        createdAt: new Date().toISOString(),
        status: "active"
      };

      users.push(newUser);
      localStorage.setItem("users", JSON.stringify(users));

      sessionStorage.setItem("currentUser", JSON.stringify({
        id: newUser.id,
        name: newUser.name,
        email: newUser.email
      }));

      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>

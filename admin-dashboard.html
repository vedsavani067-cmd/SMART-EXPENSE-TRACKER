<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Smart Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      background-size: 200% 200%;
      animation: gradientShift 15s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body class="font-[Inter] min-h-screen text-white p-0 m-0" onload="loadAdminStats()">
  <aside class="fixed left-0 top-0 h-screen w-64 glass p-8 flex flex-col z-20">
    <div class="text-xl font-bold mb-8 flex items-center gap-3">
      <span class="text-2xl">🛠️</span><span>Admin Panel</span>
    </div>

    <nav class="flex-1 space-y-2">
      <a href="admin-dashboard.html" class="flex items-center gap-3 p-3 rounded-xl bg-white/10 text-white border border-white/20">
        <span>📌</span><span>Dashboard</span>
      </a>
      <a href="manage-users.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">
        <span>👥</span><span>Manage Users</span>
      </a>
      <a href="manage-categories.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">
        <span>🏷️</span><span>Categories</span>
      </a>
    </nav>

    <a href="admin-login.html"
       onclick="sessionStorage.removeItem('isAdmin')"
       class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all mt-auto">
      <span>🚪</span><span>Logout</span>
    </a>
  </aside>

  <main class="ml-64 p-8 pt-20">
    <header class="mb-12">
      <h1 class="text-4xl font-bold mb-2">System Overview</h1>
      <p class="text-xl text-gray-300">Admin Control Center</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
      <div class="glass p-6 rounded-2xl">
        <div class="text-gray-400 mb-2">Total Users</div>
        <div class="text-3xl font-bold text-white" id="totalUsers">0</div>
      </div>

      <div class="glass p-6 rounded-2xl">
        <div class="text-gray-400 mb-2">Total System Volume</div>
        <div class="text-3xl font-bold text-amber-400 font-mono tabular-nums max-w-full overflow-hidden text-ellipsis whitespace-nowrap"
             id="totalVolume" title="₹0">₹0</div>
      </div>

      <div class="glass p-6 rounded-2xl">
        <div class="text-gray-400 mb-2">Total Transactions</div>
        <div class="text-3xl font-bold text-blue-400" id="txCount">0</div>
      </div>
    </div>

    <div class="glass p-8 rounded-2xl">
      <div class="flex items-center justify-between gap-4 flex-wrap mb-6">
        <div>
          <h2 class="text-xl font-bold">User-wise Activity</h2>
        
        </div>

        <input
          id="userSearch"
          type="text"
          placeholder="Search user… (e.g., ved, @gmail, 102)"
          class="w-full md:w-96 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500"
          oninput="renderUserGroups()"
        />
      </div>

      <div class="space-y-6" id="activityLog">
        <div class="text-gray-400">No activity found.</div>
      </div>
    </div>
  </main>

  <script>
    const MAX_AMOUNT = 10000000; // 1 Cr
    let __userGroupsCache = [];

    function safeAmount(x) {
      const n = Number(String(x ?? "").replaceAll(",", "").trim());
      if (!Number.isFinite(n)) return 0;
      if (n < 1 || n > MAX_AMOUNT) return 0;
      return n;
    }

    function money(n) {
      return "₹" + n.toLocaleString("en-IN", { maximumFractionDigits: 0 });
    }

    (function guardAdmin() {
      if (sessionStorage.getItem("isAdmin") !== "true") {
        window.location.href = "admin-login.html";
      }
    })();

    function userTitle(txList) {
      const t0 = txList[0] || {};
      return t0.userName || t0.userEmail || (t0.userId ? `User ${t0.userId}` : "Unknown user");
    }

    function renderTxRow(t, isIncome) {
      const time = t.date ? new Date(t.date).toLocaleDateString() : "";
      const amt = safeAmount(t.amount);
      const amtClass = isIncome ? "text-green-400" : "text-red-400";
      const label = t.category || "Transaction";
      return `
        <div class="flex items-center justify-between gap-3 p-3 rounded-xl bg-white/5">
          <div class="min-w-0">
            <div class="font-semibold truncate">${label}</div>
            <div class="text-xs text-gray-400">${time}</div>
          </div>
          <div class="font-mono font-bold ${amtClass} whitespace-nowrap">${money(amt)}</div>
        </div>
      `;
    }

    function renderUserGroups() {
      const log = document.getElementById("activityLog");
      const q = (document.getElementById("userSearch")?.value || "").trim().toLowerCase();

      const filtered = !q
        ? __userGroupsCache
        : __userGroupsCache.filter(u => (`${u.key} ${u.name}`.toLowerCase()).includes(q));

      if (!filtered.length) {
        log.innerHTML = `<div class="text-gray-400">No users match your search.</div>`;
        return;
      }

      log.innerHTML = filtered.map(u => {
        const incHTML = u.incomeTx.slice(0, 3).map(t => renderTxRow(t, true)).join("")
          || `<div class="text-gray-500 text-sm">No income entries</div>`;

        const expHTML = u.expenseTx.slice(0, 3).map(t => renderTxRow(t, false)).join("")
          || `<div class="text-gray-500 text-sm">No expense entries</div>`;

        return `
          <div class="p-5 rounded-2xl bg-white/5 border border-white/10">
            <div class="flex items-start justify-between gap-4 flex-wrap">
              <div class="min-w-0">
                <div class="text-lg font-bold truncate">${u.name}</div>
                <div class="text-xs text-gray-400">Key: ${u.key}</div>
              </div>

              <div class="flex gap-2 flex-wrap text-sm">
                <div class="px-3 py-2 rounded-xl bg-green-500/10 border border-green-500/20">
                  Income: <span class="font-mono text-green-300">${money(u.totalInc)}</span>
                </div>
                <div class="px-3 py-2 rounded-xl bg-red-500/10 border border-red-500/20">
                  Expense: <span class="font-mono text-red-300">${money(u.totalExp)}</span>
                </div>
                <div class="px-3 py-2 rounded-xl bg-indigo-500/10 border border-indigo-500/20">
                  Net: <span class="font-mono text-indigo-200">${money(u.net)}</span>
                </div>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-5">
              <div>
                <div class="text-sm font-semibold mb-2 text-green-200">Recent Income</div>
                <div class="space-y-2">${incHTML}</div>
              </div>
              <div>
                <div class="text-sm font-semibold mb-2 text-red-200">Recent Expense</div>
                <div class="space-y-2">${expHTML}</div>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function loadAdminStats() {
      const users = JSON.parse(localStorage.getItem("users") || "[]");
      const transactions = JSON.parse(localStorage.getItem("transactions") || "[]");

      document.getElementById("totalUsers").textContent = users.length.toLocaleString();
      document.getElementById("txCount").textContent = transactions.length.toLocaleString();

      const volume = transactions.reduce((sum, t) => sum + safeAmount(t.amount), 0);
      const volText = money(volume);
      const volEl = document.getElementById("totalVolume");
      volEl.textContent = volText;
      volEl.title = volText;

      const log = document.getElementById("activityLog");
      if (!transactions.length) {
        log.innerHTML = `<div class="text-gray-400">No activity found.</div>`;
        __userGroupsCache = [];
        return;
      }

      const groups = new Map();
      for (const t of transactions) {
        const key = t.userId || t.userEmail || t.userName || "unknown";
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(t);
      }

      const userGroups = [...groups.entries()].sort((a, b) => {
        const aLatest = Math.max(...a[1].map(x => new Date(x.date || 0).getTime()));
        const bLatest = Math.max(...b[1].map(x => new Date(x.date || 0).getTime()));
        return bLatest - aLatest;
      });

      __userGroupsCache = userGroups.map(([key, tx]) => {
        const sorted = [...tx].sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));

        const incomeTx = sorted.filter(t => t.type === "income");
        const expenseTx = sorted.filter(t => t.type === "expense");

        const totalInc = incomeTx.reduce((s, t) => s + safeAmount(t.amount), 0);
        const totalExp = expenseTx.reduce((s, t) => s + safeAmount(t.amount), 0);

        return {
          key,
          name: userTitle(sorted),
          incomeTx,
          expenseTx,
          totalInc,
          totalExp,
          net: totalInc - totalExp
        };
      });

      renderUserGroups();
    }
  </script>
</body>
</html>

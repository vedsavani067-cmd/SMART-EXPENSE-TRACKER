<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Expense | Smart Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); background-size: 200% 200%; animation: gradientShift 15s ease infinite; }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>

<body class="font-[Inter] min-h-screen text-white p-0 m-0">
  <aside class="fixed left-0 top-0 h-screen w-64 glass p-8 flex flex-col z-20">
    <div class="text-xl font-bold mb-8 flex items-center gap-3">
      <span class="text-2xl">💰</span><span>Expense Tracker</span>
    </div>
    <nav class="flex-1 space-y-2">
      <a href="dashboard.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">📌 Dashboard</a>
      <a href="add-income.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">🟢 Add Income</a>
      <a href="add-expense.html" class="flex items-center gap-3 p-3 rounded-xl bg-white/10 text-white border border-white/20">🔴 Add Expense</a>
      <a href="history.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">🧾 History</a>
      <a href="reports.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all">📊 Reports</a>
    </nav>
    <a href="login.html" onclick="sessionStorage.removeItem('currentUser')" class="flex items-center gap-3 p-3 rounded-lg text-gray-300 hover:bg-white/10 transition-all mt-auto">🚪 Logout</a>
  </aside>

  <main class="ml-64 p-8 pt-20">
    <header class="mb-10">
      <h1 class="text-4xl font-bold">Add Expense</h1>
      <p class="text-gray-300 mt-2">Track your spending.</p>
    </header>

    <div class="max-w-2xl">
      <div class="glass p-8 rounded-3xl">
        <form id="expenseForm" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Amount</label>
          <input type="number" id="amount" required min="1" max="10000000" step="1"
              class="w-full p-4 bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:ring-2 ring-red-500 transition-all"
              placeholder="0.00" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Category</label>
            <div class="grid grid-cols-4 gap-3">
              <label class="cursor-pointer">
                <input type="radio" name="category" value="Food" class="peer sr-only" checked>
                <div class="p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 peer-checked:bg-red-500/20 peer-checked:border-red-500 transition-all text-center">Food</div>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="category" value="Transport" class="peer sr-only">
                <div class="p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 peer-checked:bg-red-500/20 peer-checked:border-red-500 transition-all text-center">Transport</div>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="category" value="Shopping" class="peer sr-only">
                <div class="p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 peer-checked:bg-red-500/20 peer-checked:border-red-500 transition-all text-center">Shop</div>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="category" value="Bills" class="peer sr-only">
                <div class="p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 peer-checked:bg-red-500/20 peer-checked:border-red-500 transition-all text-center">Bills</div>
              </label>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">Date</label>
              <input type="date" id="date" required
                class="w-full p-4 bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:ring-2 ring-red-500 transition-all" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">Description</label>
              <input type="text" id="description"
                class="w-full p-4 bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:ring-2 ring-red-500 transition-all"
                placeholder="Optional note" />
            </div>
          </div>

          <div class="flex gap-4 pt-2">
            <button type="submit"
              class="flex-1 py-4 bg-gradient-to-r from-red-500 to-pink-600 hover:from-red-600 hover:to-pink-700 text-white font-bold rounded-2xl shadow-lg shadow-red-500/20 transition-all transform hover:scale-1.02">
              Add Expense
            </button>
            <a href="dashboard.html" class="px-8 py-4 bg-white/10 hover:bg-white/20 text-white font-semibold rounded-2xl transition-all">
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </main>

 <script>
  const MAX_AMOUNT = 10000000; // 1 Cr

  function requireLogin() {
    const currentUser = JSON.parse(sessionStorage.getItem("currentUser") || "null");
    if (!currentUser) { window.location.href = "login.html"; return null; }
    if (!localStorage.getItem("transactions")) localStorage.setItem("transactions", "[]");
    return currentUser;
  }

  function safeAmount(x) {
    const n = Number(String(x ?? "").replaceAll(",", "").trim());
    if (!Number.isFinite(n)) return 0;
    if (n < 1 || n > MAX_AMOUNT) return 0;
    return n;
  }

  const __user = requireLogin();
  if (__user) document.getElementById("date").valueAsDate = new Date();

  document.getElementById("expenseForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const currentUser = requireLogin();
    if (!currentUser) return;

    const amountStr = document.getElementById("amount").value;
    const category = document.querySelector("input[name='category']:checked")?.value;
    const date = document.getElementById("date").value;
    const description = document.getElementById("description").value;

    if (!amountStr || !category || !date) {
      alert("Please fill in all required fields.");
      return;
    }

    const amt = safeAmount(amountStr);
    if (!amt || !Number.isInteger(amt)) {
      alert("Please enter a valid whole number amount (1 to 1 Cr).");
      return;
    }

    const transactions = JSON.parse(localStorage.getItem("transactions") || "[]");

    const expense = {
      id: Date.now(),
      type: "expense",
      amount: amt,
      category: category,
      description: description,
      date: date,
      userId: currentUser.id,
      userName: currentUser.name,
      userEmail: currentUser.email
    };

    transactions.push(expense);
    localStorage.setItem("transactions", JSON.stringify(transactions));

    alert("Expense added successfully!");
    window.location.href = "dashboard.html";
  });
</script>

</body>
</html>
